  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

h-l:0 16px 48px rgba(16,43,80,.16),0 4px 14px rgba(16,43,80,.08);\n      --ease:cubic-bezier(.4,0,.2,1);\n      --fh:'Bricolage Grotesque',sans-serif;\n      --fb:'Plus Jakarta Sans',sans-serif;\n      --fm:'JetBrains Mono',monospace;\n      --r-s:6px; --r-m:10px; --r-l:16px; --r-xl:22px;\n    }\n    html{scroll-behavior:smooth;}\n    body{font-family:var(--fb);background:var(--bg);color:var(--t1);line-height:1.7;-webkit-font-smoothing:antialiased;overflow-x:hidden;}\n    h1,h2,h3,h4{font-family:var(--fh);letter-spacing:-0.022em;line-height:1.07;}\n    a{text-decoration:none;color:inherit;}\n    .wrap{max-width:1160px;margin:0 auto;padding:0 28px;}\n    .sp{padding:112px 0;} .sp-sm{padding:80px 0;}\n    @keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}\n    @keyframes pls{0%,100%{box-shadow:0 0 0 0 rgba(29,200,121,.45);}70%{box-shadow:0 0 0 10px rgba(29,200,121,0);}}\n    @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}\n    @keyframes slideInL{from{opacity:0;transform:translateX(-16px);}to{opacity:1;transform:translateX(0);}}\n    @keyframes slideInR{from{opacity:0;transform:translateX(16px);}to{opacity:1;transform:translateX(0);}}\n    .au{animation:fadeUp .65s var(--ease) both;}\n    .au-d1{animation-delay:.08s;} .au-d2{animation-delay:.16s;} .au-d3{animation-delay:.24s;} .au-d4{animation-delay:.36s;}\n    .rv{opacity:0;transform:translateY(20px);transition:opacity .6s var(--ease),transform .6s var(--ease);}\n    .rv.in{opacity:1;transform:none;}\n\n    /* ── EYEBROW ── */\n    .ey{display:block;font-family:var(--fb);font-size:11.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--em-dk);margin-bottom:16px;line-height:1.4;}\n    .ey-light{color:rgba(29,200,121,.85);}\n\n    /* ── BUTTONS ── */\n    .btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--fb);font-size:15px;font-weight:600;border-radius:var(--r-m);padding:13px 22px;cursor:pointer;transition:all .18s var(--ease);border:2px solid transparent;white-space:nowrap;line-height:1;}\n    .btn-em{background:var(--em);color:var(--navy);border-color:var(--em);box-shadow:0 1px 0 rgba(255,255,255,.18) inset,0 2px 6px rgba(29,200,121,.18);}\n    .btn-em:hover{background:var(--em-h);border-color:var(--em-h);transform:translateY(-2px);box-shadow:0 1px 0 rgba(255,255,255,.14) inset,0 8px 28px rgba(29,200,121,.38);}\n    .btn-em:active{transform:translateY(0);box-shadow:none;}\n    .btn-em:focus-visible{outline:none;box-shadow:0 0 0 3px rgba(29,200,121,.38);}\n    .btn-od{background:transparent;color:#FFF;border-color:rgba(255,255,255,.22);}\n    .btn-od:hover{border-color:rgba(255,255,255,.6);background:rgba(255,255,255,.07);transform:translateY(-1px);}\n    .btn-ol{background:transparent;color:var(--t1);border-color:var(--bd);}\n    .btn-ol:hover{border-color:var(--navy);background:var(--navy-t);transform:translateY(-1px);}\n    .btn-lg{font-size:16px;padding:15px 28px;letter-spacing:.005em;}\n    .btn-sm{font-size:13px;padding:8px 16px;}\n\n    /* ── SECTION HEAD ── */\n    .sh{text-align:center;margin-bottom:68px;}\n    .sh h2{font-size:clamp(30px,4vw,46px);font-weight:800;margin-bottom:18px;color:var(--t1);}\n    .sh p{font-size:17px;color:var(--t2);max-width:540px;margin:0 auto;line-height:1.7;}\n\n    /* ═══════════════════════════════\n       NAVBAR\n    ═══════════════════════════════ */\n    #nav{position:sticky;top:0;z-index:200;background:rgba(245,248,250,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1.5px solid var(--bd);transition:box-shadow .2s var(--ease);}\n    #nav.scrolled{box-shadow:var(--sh-s);}\n    .nav-i{display:flex;align-items:center;height:64px;gap:0;}\n    .nav-logo{display:flex;align-items:center;gap:9px;flex-shrink:0;}\n    .nav-lm{width:30px;height:30px;background:var(--navy);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}\n    .nav-ln{font-family:var(--fh);font-size:17px;font-weight:700;color:var(--navy);letter-spacing:-0.02em;}\n    .nav-links{flex:1;display:flex;align-items:center;justify-content:center;gap:2px;list-style:none;}\n    .nav-links a{font-size:14px;font-weight:500;color:var(--t2);padding:6px 13px;border-radius:var(--r-s);transition:color .15s,background .15s;}\n    .nav-links a:hover{color:var(--t1);background:rgba(16,43,80,.06);}\n    .nav-acts{display:flex;align-items:center;gap:8px;flex-shrink:0;}\n    .nav-login{font-size:14px;font-weight:500;color:var(--t2);padding:6px 12px;border-radius:var(--r-s);transition:color .15s;}\n    .nav-login:hover{color:var(--t1);}\n    .hbg{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:7px;border-radius:var(--r-s);}\n    .hbg span{display:block;width:21px;height:2px;background:var(--t1);border-radius:2px;transition:all .2s var(--ease);}\n    .hbg.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}\n    .hbg.open span:nth-child(2){opacity:0;}\n    .hbg.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}\n    .mob-menu{display:none;flex-direction:column;gap:3px;padding:14px 20px 18px;border-top:1px solid var(--bd);background:rgba(245,248,250,.98);}\n    .mob-menu.open{display:flex;}\n    .mob-menu a{font-size:15px;font-weight:500;color:var(--t1);padding:10px 12px;border-radius:var(--r-s);}\n    .mob-menu .btn{width:100%;justify-content:center;margin-top:6px;}\n\n    /* ═══════════════════════════════\n       HERO\n    ═══════════════════════════════ */\n    .hero{background:var(--navy);overflow:hidden;position:relative;padding:0;}\n    .hero::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.055) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;}\n    .hero::after{content:'';position:absolute;top:-10%;right:5%;width:680px;height:680px;border-radius:50%;background:radial-gradient(circle,rgba(29,200,121,.09) 0%,transparent 60%);pointer-events:none;}\n    .hero-glow2{position:absolute;bottom:-15%;left:-5%;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(16,43,80,.8) 0%,transparent 65%);pointer-events:none;}\n    .hero-i{display:grid;grid-template-columns:1.08fr 1fr;gap:72px;align-items:center;padding:80px 0 72px;position:relative;z-index:1;}\n    .hero-copy{}\n    .hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(29,200,121,.11);border:1px solid rgba(29,200,121,.28);border-radius:100px;padding:6px 16px 6px 10px;font-size:13px;font-weight:500;color:rgba(255,255,255,.88);margin-bottom:32px;letter-spacing:.01em;}\n    .hero-dot{width:7px;height:7px;border-radius:50%;background:var(--em);animation:pls 2.2s infinite;flex-shrink:0;}\n    .hero h1{font-size:clamp(40px,5vw,64px);font-weight:800;line-height:1.03;letter-spacing:-0.03em;color:#FFF;margin-bottom:20px;}\n    .hero-em{color:var(--em);}\n    .hero-sub{font-size:17px;line-height:1.7;color:rgba(255,255,255,.65);margin-bottom:32px;max-width:470px;}\n    .hero-ctas{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:36px;}\n    .hero-trust{display:flex;gap:0;align-items:center;flex-wrap:wrap;}\n    .ht{display:flex;align-items:center;gap:7px;font-size:13px;color:rgba(255,255,255,.52);padding:0 18px 0 0;margin-right:18px;border-right:1px solid rgba(255,255,255,.1);}\n    .ht:last-child{border-right:none;padding-right:0;margin-right:0;}\n    .ht svg{flex-shrink:0;opacity:.8;}\n    .avs{display:flex;}\n    .av{width:26px;height:26px;border-radius:50%;border:2px solid var(--navy);font-family:var(--fh);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-left:-7px;}\n    .av:first-child{margin-left:0;}\n\n    /* App mockup */\n    .hero-mock{position:relative;display:flex;align-items:flex-start;justify-content:center;padding:20px 72px 20px 72px;overflow:visible;}\n    .mock-wrap{position:relative;overflow:visible;}\n    .mock ;align-items:center;gap:4px;font-size:10px;font-weight:600;color:var(--t2);text-align:center;cursor:default;transition:border-color .15s;}\n    .mock-qb.hi{background:var(--em);border-color:var(--em);color:var(--navy);}\n    .mock-qi{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;}\n    .mock-txl-h{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;}\n    .mock-tx{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--bd);}\n    .mock-tx:last-child{border:none;}\n    .mock-tx-ic{width:7px;height:7px;border-radius:50%;background:var(--em);flex-shrink:0;}\n    .mock-tx-n{font-size:11px;font-weight:500;color:var(--t1);flex:1;}\n    .mock-tx-a{font-family:var(--fm);font-size:11px;font-weight:600;color:var(--t1);}\n\n    /* Floating cards */\n    .fc{position:absolute;background:#FFF;border-radius:14px;box-shadow:0 8px 28px rgba(16,43,80,.14),0 0 0 1px rgba(16,43,80,.06);padding:12px 16px;z-index:3;white-space:nowrap;}\n    .fc-ok{top:-20px;left:-64px;animation:slideInL .7s var(--ease) .5s both;}\n    .fc-of{bottom:52px;right:-68px;animation:slideInR .7s var(--ease) .7s both;}\n    .fc-ik{display:flex;align-items:center;gap:9px;}\n    .fc-dot{width:8px;height:8px;border-radius:50%;background:var(--em);flex-shrink:0;box-shadow:0 0 0 3px rgba(29,200,121,.2);}\n    .fc-label{font-size:12px;font-weight:700;color:var(--t1);}\n    .fc-sub{font-size:11px;color:var(--t3);margin-top:2px;}\n    .fc-num{font-family:var(--fm);font-size:16px;font-weight:600;color:var(--em-dk);}\n\n    /* ═══════════════════════════════\n       BENEFITS\n    ═══════════════════════════════ */\n    .benefits{background:var(--s1);}\n    .ben-g{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;}\n    .ben-c{background:var(--bg);border:1.5px solid var(--bd);border-radius:var(--r-xl);padding:32px 28px 30px;transition:box-shadow .25s var(--ease),transform .25s var(--ease),border-color .25s;}\n    .ben-c:hover{box-shadow:0 8px 32px rgba(16,43,80,.12),0 2px 8px rgba(16,43,80,.06);transform:translateY(-4px);border-color:var(--em);}\n    .ben-ico{width:48px;height:48px;border-radius:var(--r-m);display:flex;align-items:center;justify-content:center;margin-bottom:22px;}\n    .ben-c h3{font-size:16px;font-weight:700;margin-bottom:10px;letter-spacing:-0.015em;}\n    .ben-c p{font-size:14px;line-height:1.68;color:var(--t2);}\n\n    /* ═══════════════════════════════\n       APP PREVIEW\n    ═══════════════════════════════ */\n    .prev-s{background:var(--bg);}\n    .prev-i{display:grid;grid-template-columns:1fr 1.1fr;gap:80px;align-items:center;}\n    .prev-copy h2{font-size:clamp(26px,3.2vw,38px);font-weight:800;margin-bottom:18px;}\n    .prev-copy p{font-size:16px;color:var(--t2);line-height:1.7;margin-bottom:30px;}\n    .prev-feats{display:flex;flex-direction:column;gap:12px;margin-bottom:34px;}\n    .prev-f{display:flex;gap:11px;align-items:center;}\n    .prev-f-ic{width:22px;height:22px;border-radius:5px;background:var(--em-t);display:flex;align-items:center;justify-content:center;flex-shrink:0;}\n    .prev-f-t{font-size:14px;font-weight:500;color:var(--t1);}\n    .prev-screen{background:var(--navy);border-radius:20px;overflow:hidden;box-shadow:var(--sh-l);}\n    .prev-screen-hd{padding:16px 20px;background:#091729;display:flex;align-items:center;justify-content:space-between;}\n    .prev-screen-ttl{font-family:var(--fh);font-size:15px;font-weight:700;color:#FFF;}\n    .prev-screen-sub{font-size:10px;color:rgba(255,255,255,.4);font-family:var(--fm);}\n    .prev-screen-btn{background:rgba(255,255,255,.1);border:none;border-radius:6px;padding:6px 10px;font-size:11px;color:rgba(255,255,255,.7);cursor:default;}\n    .prev-tbl{padding:16px 18px 18px;}\n    .prev-tbl-hd{display:grid;grid-template-columns:1fr 56px 70px;gap:8px;padding:7px 0 10px;border-bottom:1.5px solid rgba(255,255,255,.1);}\n    .prev-tbl-hl{font-size:9px;font-weight:700;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.09em;}\n    .prev-tbl-hl:nth-child(2){text-align:center;}\n    .prev-tbl-hl:last-child{text-align:right;}\n    .prev-row{display:grid;grid-template-columns:1fr 56px 70px;gap:8px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.06);align-items:center;}\n    .prev-row:last-child{border:none;}\n    .prev-pn{font-size:12.5px;font-weight:500;color:rgba(255,255,255,.9);}\n    .prev-ps{font-family:var(--fm);font-size:12px;font-weight:600;text-align:center;}\n    .prev-pp{font-family:var(--fm);font-size:12px;color:rgba(255,255,255,.6);text-align:right;}\n\n    /* ═══════════════════════════════\n       FEATURES\n    ═══════════════════════════════ */\n    .feats-s{background:var(--s1);}\n    .feat-g{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}\n    .feat-c{background:var(--bg);border:1.5px solid var(--bd);border-radius:var(--r-l);padding:28px 26px;display:flex;gap:18px;align-items:flex-start;transition:box-shadow .25s var(--ease),border-color .25s,transform .25s;}\n    .feat-c:hover{box-shadow:0 8px 28px rgba(16,43,80,.10),0 2px 6px rgba(16,43,80,.05);border-color:var(--em);transform:translateY(-3px);}\n    .feat-ico{width:44px;height:44px;border-radius:var(--r-m);display:flex;align-items:center;justify-content:center;flex-shrink:0;}\n    .feat-c h3{font-size:15px;font-weight:700;margin-bottom:7px;letter-spacing:-0.012em;}\n    .feat-c p{font-size:14px;color:var(--t2);line-height:1.65;}\n\n    /* ═══════════════════════════════\n       HOW IT WORKS\n    ═══════════════════════════════ */\n    .how-s{background:var(--bg-alt);}\n    .steps{display:grid;grid-template-columns:repeat(4,1fr);gap:32px;position:relative;margin-bottom:48px;}\n    .steps::before{content:'';position:absolute;top:27px;left:calc(12.5% + 20px);right:calc(12.5% + 20px);height:2px;background:linear-gradient(to right,var(--em) 0%,var(--bd) 40%,var(--bd) 100%);z-index:0;}\n    .step{text-align:center;position:relative;}\n    .step-n{width:56px;height:56px;border-radius:50%;background:var(--s1);border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-family:var(--fm);font-size:18px;font-weight:600;color:var(--t2);position:relative;z-index:1;transition:background .22s var(--ease),border-color .22s,color .22s;}\n    .step-n.active{background:var(--em);border-color:var(--em);color:var(--navy);}\n    .step:hover .step-n:not(.active){background:var(--navy);border-color:var(--navy);color:#FFF;}\n    .step h3{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--t1);}\n    .step p{font-size:13.5px;color:var(--t2);line-height:1.6;}\n\n    /* ═══════════════════════════════\n       COMPARISON\n    ═══════════════════════════════ */\n    .cmp-s{background:var(--s1);}\n    .cmp-tbl{background:var(--s1);border:1.5px solid var(--bd);border-radius:var(--r-xl);overflow:hidden;box-shadow:var(--sh-xs);}\n    .cmp-hdr{display:grid;grid-template-columns:1.3fr 1fr 1fr;}\n    .cmp-hc{padding:18px 24px;font-size:13px;font-weight:700;text-align:center;}\n    .cmp-hc.feat{text-align:left;background:var(--bg);color:var(--t3);font-weight:500;font-size:12px;text-transform:uppercase;letter-spacing:.08em;}\n    .cmp-hc.trad{background:#EDEAE6;color:var(--t3);font-style:italic;}\n    .cmp-hc.mod{background:var(--navy);color:#FFF;display:flex;flex-direction:column;align-items:center;gap:4px;}\n    .cmp-hc.mod small{font-size:10px;font-weight:500;color:rgba(255,255,255,.5);letter-spacing:.05em;}\n    .cmp-row{display:grid;grid-template-columns:1.3fr 1fr 1fr;border-top:1.5px solid var(--bd);}\n    .cmp-row:hover{background:rgba(245,248,250,.6);}\n    .cmp-c{padding:14px 24px;font-size:13.5px;display:flex;align-items:center;gap:8px;}\n    .cmp-c.feat{color:var(--t1);font-weight:500;}\n    .cmp-c.trad{color:var(--t3);background:#FAF8F5;justify-content:center;text-decoration:line-through;font-size:13px;}\n    .cmp-c.mod{color:var(--em-dk);background:var(--e h(q => {\n      q.addEventListener('click', () => {\n        const item = q.parentElement;\n        const isOpen = item.classList.contains('open');\n        document.querySelectorAll('.faq-it').forEach(i => i.classList.remove('open'));\n        if (!isOpen) item.classList.add('open');\n      });\n    });\n\n    // Scroll reveal with per-row stagger\n    const obs = new IntersectionObserver((entries) => {\n      entries.forEach(e => {\n        if (e.isIntersecting) {\n          e.target.classList.add('in');\n          obs.unobserve(e.target);\n        }\n      });\n    }, { threshold: 0.06, rootMargin: '0px 0px -28px 0px' });\n\n    document.querySelectorAll('.rv').forEach((el) => {\n      const gridParent = el.closest('.ben-g, .feat-g, .tst-g, .steps, .faq-g');\n      if (gridParent) {\n        const siblings = Array.from(gridParent.querySelectorAll('.rv'));\n        const idx = siblings.indexOf(el);\n        el.style.transitionDelay = `${idx * 0.08}s`;\n      }\n      obs.observe(el);\n    });\n\n    // Counter animation for hero sales number\n    const salesEl = document.querySelector('.mock-sc-v');\n    if (salesEl) {\n      const target = 1847.50;\n      const duration = 1400;\n      const start = performance.now();\n      const tick = (now) => {\n        const p = Math.min((now - start) / duration, 1);\n        const ease = 1 - Math.pow(1 - p, 3);\n        const val = (target * ease);\n        salesEl.textContent = '$' + val.toFixed(2).replace(/\\B(?=(\\d{3})+(?!\\d))/g, ',');\n        if (p < 1) requestAnimationFrame(tick);\n      };\n      setTimeout(() => requestAnimationFrame(tick), 600);\n    }\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
